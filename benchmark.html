<!DOCTYPE html>

<body class="bench-page">

    <div class="logo">HyperScroll <span>Benchmark</span></div>
    <div class="count">Same dynamic-height chat data source, scripted 5s constant scroll + random jumps</div>

    <section>
      <h2>@hyperscroll/core</h2>
      <div class="pane" id="paneHyper"></div>

      <h2>@tanstack/virtual-core (dynamic measure)</h2>
      <div class="pane" id="paneTanstack"></div>
